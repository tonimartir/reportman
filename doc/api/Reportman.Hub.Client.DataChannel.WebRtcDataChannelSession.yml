- uid: Reportman.Hub.Client.DataChannel.WebRtcDataChannelSession.SendKeepaliveAsync(System.Threading.CancellationToken)
  commentId: M:Reportman.Hub.Client.DataChannel.WebRtcDataChannelSession.SendKeepaliveAsync(System.Threading.CancellationToken)
  id: SendKeepaliveAsync(System.Threading.CancellationToken)
  parent: Reportman.Hub.Client.DataChannel.WebRtcDataChannelSession
  langs:
  - csharp
  - vb
  name: SendKeepaliveAsync(CancellationToken)
  nameWithType: WebRtcDataChannelSession.SendKeepaliveAsync(CancellationToken)
  fullName: Reportman.Hub.Client.DataChannel.WebRtcDataChannelSession.SendKeepaliveAsync(System.Threading.CancellationToken)
  type: Method
  source:
    href: https://github.com/tonimartir/reportman/blob/2308c64c7bfc797dd7c65c5fcad03fe750e2c96e/Reportman.DataChannel/WebRtcDataChannelSession.cs
  assemblies:
  - Reportman.DataChannel
  namespace: Reportman.Hub.Client.DataChannel
  summary: >-
    Sends a tiny ping over the DataChannel and waits briefly for the pong.

    Used by the pool to keep the NAT mapping warm during idle windows so

    the next real query doesn't pay the full STUN/ICE/DTLS setup cost.

    Returns true if the channel was alive at send time (pong arrival is

    not strictly required — the outbound UDP packet alone refreshes the

    router's binding).
  example: []
  syntax:
    content: public Task<bool> SendKeepaliveAsync(CancellationToken ct = default)
    parameters:
    - id: ct
      type: System.Threading.CancellationToken
    return:
      type: System.Threading.Tasks.Task{System.Boolean}
    content.vb: Public Function SendKeepaliveAsync(ct As CancellationToken = Nothing) As Task(Of Boolean)
  overload: Reportman.Hub.Client.DataChannel.WebRtcDataChannelSession.SendKeepaliveAsync*
