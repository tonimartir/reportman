- uid: Reportman.Hub.Client.DataChannel.WebRtcDataChannelSession.ExecuteAsync(System.String,System.Object,System.Threading.CancellationToken)
  commentId: M:Reportman.Hub.Client.DataChannel.WebRtcDataChannelSession.ExecuteAsync(System.String,System.Object,System.Threading.CancellationToken)
  id: ExecuteAsync(System.String,System.Object,System.Threading.CancellationToken)
  parent: Reportman.Hub.Client.DataChannel.WebRtcDataChannelSession
  langs:
  - csharp
  - vb
  name: ExecuteAsync(string, object, CancellationToken)
  nameWithType: WebRtcDataChannelSession.ExecuteAsync(string, object, CancellationToken)
  fullName: Reportman.Hub.Client.DataChannel.WebRtcDataChannelSession.ExecuteAsync(string, object, System.Threading.CancellationToken)
  type: Method
  source:
    href: https://github.com/tonimartir/reportman/blob/2308c64c7bfc797dd7c65c5fcad03fe750e2c96e/Reportman.DataChannel/WebRtcDataChannelSession.cs
  assemblies:
  - Reportman.DataChannel
  namespace: Reportman.Hub.Client.DataChannel
  summary: >-
    Sends a single <code>{requestId, action, data}</code> request on the live

    DataChannel and returns the fully reassembled payload bytes. The

    caller decodes them per action: SQL-shaped actions get

    FastSerializer-binary bytes; metadata actions get UTF-8 JSON bytes.

    Progress messages from the Agent are surfaced via the constructor's

    onProgress callback. A 15s gap without any message from the Agent

    throws — the request is considered dead.
  example: []
  syntax:
    content: public Task<byte[]> ExecuteAsync(string action, object data, CancellationToken ct)
    parameters:
    - id: action
      type: System.String
    - id: data
      type: System.Object
    - id: ct
      type: System.Threading.CancellationToken
    return:
      type: System.Threading.Tasks.Task{System.Byte[]}
    content.vb: Public Function ExecuteAsync(action As String, data As Object, ct As CancellationToken) As Task(Of Byte())
  overload: Reportman.Hub.Client.DataChannel.WebRtcDataChannelSession.ExecuteAsync*
  nameWithType.vb: WebRtcDataChannelSession.ExecuteAsync(String, Object, CancellationToken)
  fullName.vb: Reportman.Hub.Client.DataChannel.WebRtcDataChannelSession.ExecuteAsync(String, Object, System.Threading.CancellationToken)
