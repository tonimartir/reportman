- uid: Reportman.Hub.Client.DataChannel.WebRtcDataChannelSession.IsBusy
  commentId: P:Reportman.Hub.Client.DataChannel.WebRtcDataChannelSession.IsBusy
  id: IsBusy
  parent: Reportman.Hub.Client.DataChannel.WebRtcDataChannelSession
  langs:
  - csharp
  - vb
  name: IsBusy
  nameWithType: WebRtcDataChannelSession.IsBusy
  fullName: Reportman.Hub.Client.DataChannel.WebRtcDataChannelSession.IsBusy
  type: Property
  source:
    href: https://github.com/tonimartir/reportman/blob/2308c64c7bfc797dd7c65c5fcad03fe750e2c96e/Reportman.DataChannel/WebRtcDataChannelSession.cs
  assemblies:
  - Reportman.DataChannel
  namespace: Reportman.Hub.Client.DataChannel
  summary: >-
    True while at least one <xref href="Reportman.Hub.Client.DataChannel.WebRtcDataChannelSession.ExecuteAsync(System.String%2cSystem.Object%2cSystem.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref> is in flight. The

    pool reads this in its idle/max-life check to avoid evicting a session

    whose query is still running — without this guard a query lasting

    longer than the pool's idle window (60s) or max-lifetime (10min)

    would be killed mid-flight as the timer fires against a session

    whose <code>Touch()</code> only ran at the start of the request.
  example: []
  syntax:
    content: public bool IsBusy { get; }
    parameters: []
    return:
      type: System.Boolean
    content.vb: Public ReadOnly Property IsBusy As Boolean
  overload: Reportman.Hub.Client.DataChannel.WebRtcDataChannelSession.IsBusy*
- uid: Reportman.Hub.Client.DataChannel.WebRtcDataChannelSession.DiagnosticLog
  commentId: E:Reportman.Hub.Client.DataChannel.WebRtcDataChannelSession.DiagnosticLog
  id: DiagnosticLog
  parent: Reportman.Hub.Client.DataChannel.WebRtcDataChannelSession
  langs:
  - csharp
  - vb
  name: DiagnosticLog
  nameWithType: WebRtcDataChannelSession.DiagnosticLog
  fullName: Reportman.Hub.Client.DataChannel.WebRtcDataChannelSession.DiagnosticLog
  type: Event
  source:
    href: https://github.com/tonimartir/reportman/blob/2308c64c7bfc797dd7c65c5fcad03fe750e2c96e/Reportman.DataChannel/WebRtcDataChannelSession.cs
  assemblies:
  - Reportman.DataChannel
  namespace: Reportman.Hub.Client.DataChannel
  summary: >-
    Raised for every direct-channel negotiation trace line. A UI host (e.g.

    the Designer's "Net Log" tab) can subscribe to surface the handshake

    live: iceServers, candidates exchanged, answer arrival, peer state and

    where it threw. Fired on whatever thread produced the line (often a

    SIPSorcery worker) — subscribers must marshal to their UI thread.

    Static because sessions are created deep inside the engine

    (DirectAgentExecutor) with no handle to the UI.
  example: []
  syntax:
    content: public static event Action<string>? DiagnosticLog
    return:
      type: System.Action{System.String}
    content.vb: Public Shared Event DiagnosticLog As Action(Of String)
