  assemblies:
  - Reportman.DataChannel
  namespace: Reportman.Hub.Client.DataChannel
  summary: >-
    Closes every cached session but keeps the pool itself usable. Call on

    logout / identity change — pooled sessions hold JWTs tied to the

    previous identity and shouldn't be reused under a new one. Subsequent

    <xref href="Reportman.Hub.Client.DataChannel.WebRtcChannelPool.GetOrOpenAsync(System.Int64%2cSystem.Func%7bSystem.Threading.CancellationToken%2cSystem.Threading.Tasks.Task%7bReportman.Hub.Client.DataChannel.WebRtcDataChannelSession%7d%7d%2cSystem.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref> calls will negotiate fresh sessions.
