  summary: >-
    Returns a live session for <code class="paramref">hubDatabaseId</code>, either

    from cache or by negotiating a new one via the supplied opener. The

    opener is the same delegate the caller used to call

    <xref href="Reportman.Hub.Client.DataChannel.WebRtcDataChannelSession.TryOpenAsync(System.Net.Http.HttpClient%2cSystem.Uri%2cSystem.String%2cSystem.Object%2cSystem.Action%7bReportman.Hub.Client.DataChannel.QueryProgress%7d%2cSystem.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref> — passing it

    keeps this class free of HttpClient/Uri/bearer plumbing details.

    Returns <code>null</code> when opening fails (caller falls back to HTTP).
