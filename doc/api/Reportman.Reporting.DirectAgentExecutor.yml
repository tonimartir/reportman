  name: DirectAgentExecutor
  nameWithType: DirectAgentExecutor
  fullName: Reportman.Reporting.DirectAgentExecutor
  type: Class
  source:
    href: https://github.com/tonimartir/reportman/blob/2308c64c7bfc797dd7c65c5fcad03fe750e2c96e/Reportman.Reporting/DirectAgentExecutor.cs
  assemblies:
  - Reportman.Reporting
  namespace: Reportman.Reporting
  summary: >-
    <xref href="Reportman.Drawing.IDbCommandExecuter" data-throw-if-not-resolved="false"></xref> that tries the direct WebRTC

    DataChannel transport first and falls back to <xref href="Reportman.Reporting.HttpAgentExecutor" data-throw-if-not-resolved="false"></xref>

    transparently if the channel cannot be opened (corporate firewall,

    STUN unreachable, Agent that doesn't speak the protocol …).


    Pattern mirrors the proven path in

    <code>ReportmanAI/Reportman.Hub.Client/HubApiClient.DataChannel.cs</code>:
      - <xref href="Reportman.Reporting.DirectAgentExecutor.UseDirectChannel" data-throw-if-not-resolved="false"></xref> master switch (default true).
      - 10-minute cooldown after a failed negotiation, so subsequent
        queries don't re-pay the open-timeout (~5 s) on each one.
      - Per-database pool reuses the warm channel across calls.
      - Effective transport surfaced via <xref href="Reportman.Reporting.DirectAgentExecutor.LastConnectionMode" data-throw-if-not-resolved="false"></xref>
        and the <xref href="Reportman.Reporting.DirectAgentExecutor.ConnectionModeChanged" data-throw-if-not-resolved="false"></xref> event so a UI chip can
        bind to it without having to know about WebRTC.

    .NET Framework (net48) builds compile this file out — Reportman.DataChannel

    requires .NET 6+ (SIPSorcery). On net48 consumers get only the HTTP

    path, identical to the Linux/FPC behaviour of the Delphi engine.
  example: []
  syntax:
    content: 'public class DirectAgentExecutor : IDbCommandExecuter, IDisposable'
    content.vb: Public Class DirectAgentExecutor Implements IDbCommandExecuter, IDisposable
