- uid: Reportman.Reporting.DirectAgentExecutor.ResetChannelPool
  commentId: M:Reportman.Reporting.DirectAgentExecutor.ResetChannelPool
  id: ResetChannelPool
  parent: Reportman.Reporting.DirectAgentExecutor
  langs:
  - csharp
  - vb
  name: ResetChannelPool()
  nameWithType: DirectAgentExecutor.ResetChannelPool()
  fullName: Reportman.Reporting.DirectAgentExecutor.ResetChannelPool()
  type: Method
  source:
    href: https://github.com/tonimartir/reportman/blob/2308c64c7bfc797dd7c65c5fcad03fe750e2c96e/Reportman.Reporting/DirectAgentExecutor.cs
  assemblies:
  - Reportman.Reporting
  namespace: Reportman.Reporting
  summary: >-
    Drop every warm Direct Channel session and clear the negotiation

    cooldowns. Call after the user edits a connection (ApiKey /

    HubDatabaseId) so the next query renegotiates with the new

    credentials instead of reusing a session opened with the old ones.

    The warm pool keys sessions by HubDatabaseId, so an ApiKey change on

    the same database would otherwise keep hitting the stale session

    until the application is restarted. EvictAllAsync clears the pool

    synchronously (only the teardown of the old sessions is async), so a

    fire-and-forget call invalidates the cache immediately.
  example: []
  syntax:
    content: public static void ResetChannelPool()
    content.vb: Public Shared Sub ResetChannelPool()
  overload: Reportman.Reporting.DirectAgentExecutor.ResetChannelPool*
