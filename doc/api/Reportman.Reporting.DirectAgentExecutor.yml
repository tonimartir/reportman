- uid: Reportman.Reporting.DirectAgentExecutor.Open(System.Data.IDbCommand)
  commentId: M:Reportman.Reporting.DirectAgentExecutor.Open(System.Data.IDbCommand)
  id: Open(System.Data.IDbCommand)
  parent: Reportman.Reporting.DirectAgentExecutor
  langs:
  - csharp
  - vb
  name: Open(IDbCommand)
  nameWithType: DirectAgentExecutor.Open(IDbCommand)
  fullName: Reportman.Reporting.DirectAgentExecutor.Open(System.Data.IDbCommand)
  type: Method
  source:
    href: https://github.com/tonimartir/reportman/blob/2308c64c7bfc797dd7c65c5fcad03fe750e2c96e/Reportman.Reporting/DirectAgentExecutor.cs
  assemblies:
  - Reportman.Reporting
  namespace: Reportman.Reporting
  summary: >-
    Try the direct channel first; on any failure (cooldown active,

    negotiation failed, channel error mid-query) silently fall back

    to the inner HTTP path. The caller never sees a "direct channel

    broke" exception — it sees the data, just over HTTP. The chip is

    the only visible difference.
  example: []
  syntax:
    content: public DataTable Open(IDbCommand ncommand)
    parameters:
    - id: ncommand
      type: System.Data.IDbCommand
    return:
      type: System.Data.DataTable
    content.vb: Public Function Open(ncommand As IDbCommand) As DataTable
  overload: Reportman.Reporting.DirectAgentExecutor.Open*
  implements:
  - Reportman.Drawing.IDbCommandExecuter.Open(System.Data.IDbCommand)
